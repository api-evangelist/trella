aid: trella
name: Trella
description: >-
  Trella is a Cairo-headquartered B2B trucking marketplace and digital freight
  platform that connects shippers with carriers across the Middle East, North
  Africa, and Pakistan (MENA-P). Founded in 2019 by Omar Hagrass, Ali El
  Atrash, and Pierre Saad and backed by Y Combinator, Trella runs a digital
  load marketplace, a carrier mobile app, and a shipper web dashboard that
  together replace the traditional broker-driven, paper-based long-haul
  trucking workflow. Core platform services include load posting and
  carrier matching, instant quoting, GPS tracking and live shipment
  visibility, electronic proof of delivery (ePODs), load insurance, a
  control-tower operations layer for carrier quality and performance, and
  integrated payments and invoicing between shippers and carriers. The
  network spans 30,000+ carriers and operates from major freight hubs
  including Cairo, Alexandria, Port Said, Damietta, Sokhna, Jeddah,
  Dammam, Riyadh, and Dubai, serving industries such as FMCG,
  construction, manufacturing, agriculture, mining, e-commerce, retail,
  electronics, ceramics, and freight forwarding. Trella's revenue model
  is marketplace take-rate and value-added logistics services; there is
  no public developer API, SDK, OpenAPI specification, webhooks
  catalog, or open-source platform release for the Trella marketplace.
